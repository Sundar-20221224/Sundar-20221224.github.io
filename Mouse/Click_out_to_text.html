<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>йј ж Үж·ЎеҮәж–Үеӯ—ж•Ҳжһң</title>
    </head>
    <body>
        <script>
            (function () {
                var a_idx = 0;
                window.onclick = function (event) {
                    var a = new Array("вқӨеҜҢејәвқӨ", "вқӨж°‘дё»вқӨ", "вқӨж–ҮжҳҺвқӨ", "вқӨе’Ңи°җвқӨ", "вқӨиҮӘз”ұвқӨ", "вқӨе№ізӯүвқӨ", "вқӨе…¬жӯЈвқӨ", "вқӨжі•жІ»вқӨ", "вқӨзҲұеӣҪвқӨ",
                        "вқӨж•¬дёҡвқӨ", "вқӨиҜҡдҝЎвқӨ", "вқӨеҸӢе–„вқӨ");
    
                    var heart = document.createElement("b"); //еҲӣе»әbе…ғзҙ 
                    heart.onselectstart = new Function('event.returnValue=false'); //йҳІжӯўжӢ–еҠЁ
    
                    document.body.appendChild(heart).innerHTML = a[a_idx]; //е°Ҷbе…ғзҙ ж·»еҠ еҲ°йЎөйқўдёҠ
                    a_idx = (a_idx + 1) % a.length;
                    heart.style.cssText = "position: fixed;left:-100%;"; //з»ҷpе…ғзҙ и®ҫзҪ®ж ·ејҸ
    
                    var f = 16, // еӯ—дҪ“еӨ§е°Ҹ
                        x = event.clientX - f / 2, // жЁӘеқҗж Ү
                        y = event.clientY - f, // зәөеқҗж Ү
                        c = randomColor(), // йҡҸжңәйўңиүІ
                        a = 1, // йҖҸжҳҺеәҰ
                        s = 1.2; // ж”ҫеӨ§зј©е°Ҹ
    
                    var timer = setInterval(function () { //ж·»еҠ е®ҡж—¶еҷЁ
                        if (a <= 0) {
                            document.body.removeChild(heart);
                            clearInterval(timer);
                        } else {
                            heart.style.cssText = "font-size:16px;cursor: default;position: fixed;color:" +
                                c + ";left:" + x + "px;top:" + y + "px;opacity:" + a + ";transform:scale(" +
                                s + ");";
    
                            y--;
                            a -= 0.016;
                            s += 0.002;
                        }
                    }, 15)
    
                }
                // йҡҸжңәйўңиүІ
                function randomColor() {
    
                    return "rgb(" + (~~(Math.random() * 255)) + "," + (~~(Math.random() * 255)) + "," + (~~(Math
                    .random() * 255)) + ")";
    
                }
            }());
        </script>
    </body>
</html>
